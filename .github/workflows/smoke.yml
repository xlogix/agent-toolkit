name: Smoke

on:
  push:
  pull_request:

jobs:
  shell-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: bash -n install.sh agent-tools.sh scripts/install-agent-tools.sh scripts/release-prep.sh skills/scripts/generate-tool-catalog.sh scripts/benchmarks/run-scientific-benchmarks.sh
      - name: Verify generated skill catalog is current
        run: |
          bash skills/scripts/generate-tool-catalog.sh
          git diff --exit-code -- skills/references/TOOL-CATALOG.md
      - name: Dry run (apt)
        run: bash install.sh --package-manager apt --dry-run --extras
      - name: CLI init dry run
        run: bash agent-tools.sh init --repo . --dry-run

  powershell-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse check
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile('install.ps1', [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Dry run (winget)
        shell: pwsh
        run: ./install.ps1 -PackageManager winget -DryRun -Extras
